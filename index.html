<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calc-frame">
        <button class="del-button" type="button" onclick="clearDisplay()">DEL</button>
        <div class="output">
            <input id="output" type="text" value="0" readonly>
        </div>
        <div class="control-buttons">
            <button class="button" type="button" onclick="addSymbol('7')">7</button>
            <button class="button" type="button" onclick="addSymbol('8')">8</button>
            <button class="button" type="button" onclick="addSymbol('9')">9</button>
            <button class="ct-button" type="button" onclick="addSymbol('/')">/</button>
            <button class="button" type="button" onclick="addSymbol('4')">4</button>
            <button class="button" type="button" onclick="addSymbol('5')">5</button>
            <button class="button" type="button" onclick="addSymbol('6')">6</button>
            <button class="ct-button" type="button" onclick="addSymbol('-')">-</button>
            <button class="button" type="button" onclick="addSymbol('1')">1</button>
            <button class="button" type="button" onclick="addSymbol('2')">2</button>
            <button class="button" type="button" onclick="addSymbol('3')">3</button>
            <button class="ct-button" type="button" onclick="addSymbol('*')">x</button>
            <button class="button" type="button" onclick="addSymbol('.')">.</button>
            <button class="db-button" type="button" onclick="addSymbol('0')">0</button>
            <button class="ct-button" type="button" onclick="addSymbol('+')">+</button>
            <button class="res-button" type="button" onclick="calculate()">=</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/12.2.0/math.js"></script>
    <script src="script.js"></script>
</body>
</html>
